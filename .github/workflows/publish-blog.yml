name: 블로그 예약 발행 (하루 1편)

# 하루 1편, 대기열의 다음 글을 1개씩 발행합니다.
#   09:00 KST = 00:00 UTC
# 참고: GitHub 예약(schedule) 워크플로는 기본 브랜치(main)에서만 실행됩니다.
# 일시 중지하려면 아래 schedule 블록을 주석(#) 처리하세요.
on:
  schedule:
    - cron: "0 0 * * *"   # 매일 09:00 KST
  workflow_dispatch:   # 수동 실행(테스트)용

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 다음 글 발행 (대기열에서 1개)
        run: node scripts/build-blog.js --publish-next

      - name: 변경분 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "chore: 블로그 글 자동 발행 ($(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M'))"
            git push
          else
            echo "발행할 새 글이 없습니다. 변경 없음."
          fi
