name: 블로그 예약 발행 (하루 4회)

# 하루 4번, 대기열의 다음 글을 1개씩 발행합니다.
#   09:00 KST = 00:00 UTC
#   13:00 KST = 04:00 UTC
#   17:00 KST = 08:00 UTC
#   21:00 KST = 12:00 UTC
# 참고: GitHub 예약(schedule) 워크플로는 기본 브랜치(main)에서만 실행됩니다.
on:
  # ⏸️ 자동 발행 일시 중지 (사용자 요청, 2026-07).
  #    재개하려면 아래 schedule 블록의 주석(#)을 해제하세요.
  # schedule:
  #   - cron: "0 0 * * *"
  #   - cron: "0 4 * * *"
  #   - cron: "0 8 * * *"
  #   - cron: "0 12 * * *"
  workflow_dispatch:   # 수동 실행만 가능 (자동 발행 중지 상태)

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 다음 글 발행 (대기열에서 1개)
        run: node scripts/build-blog.js --publish-next

      - name: 변경분 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "chore: 블로그 글 자동 발행 ($(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M'))"
            git push
          else
            echo "발행할 새 글이 없습니다. 변경 없음."
          fi
