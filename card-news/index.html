<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드뉴스 현지화 도구 - 영어권 인스타 카드뉴스를 한국어로 | 한국인계산기</title>
  <meta name="description" content="영어권 인스타그램 카드뉴스 이미지와 캡션을 넣으면 헤드라인을 한국어로 번역해 원본 이미지 위에 합성하고, 캡션까지 한국어로 번역해 주는 카드뉴스 자동 현지화 도구.">
  <meta name="robots" content="noindex, nofollow">
  <link rel="canonical" href="https://calcbox.kr/card-news/">

  <!-- 캔버스 헤드라인용 한국어 폰트 (Pretendard) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="../style.css?v=6">
  <style>
    .cn-grid { display:grid; gap:16px; }
    .cn-field { display:flex; flex-direction:column; gap:6px; margin-bottom:14px; }
    .cn-field > label { font-weight:600; font-size:.95rem; }
    .cn-hint { font-size:.8rem; color:#8a90a6; }
    textarea.cn-ta { width:100%; min-height:90px; padding:10px 12px; border:1px solid #d5d9e6; border-radius:10px; font:inherit; resize:vertical; box-sizing:border-box; }
    input.cn-in { width:100%; padding:10px 12px; border:1px solid #d5d9e6; border-radius:10px; font:inherit; box-sizing:border-box; }
    .cn-drop { border:2px dashed #c4cadd; border-radius:12px; padding:18px; text-align:center; color:#8a90a6; cursor:pointer; transition:.15s; background:#fafbff; }
    .cn-drop.drag { border-color:#5b7cfa; background:#eef2ff; color:#5b7cfa; }
    .cn-thumb { max-width:100%; max-height:220px; border-radius:10px; margin-top:8px; display:block; }
    .cn-tabs { display:flex; gap:8px; margin-bottom:8px; }
    .cn-tab { padding:6px 14px; border:1px solid #d5d9e6; border-radius:999px; background:#fff; cursor:pointer; font-size:.9rem; }
    .cn-tab.on { background:#5b7cfa; color:#fff; border-color:#5b7cfa; }
    .cn-row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .cn-row > * { flex:0 0 auto; }
    .cn-seg { display:inline-flex; border:1px solid #d5d9e6; border-radius:10px; overflow:hidden; }
    .cn-seg label { padding:8px 14px; cursor:pointer; font-size:.9rem; }
    .cn-seg input { display:none; }
    .cn-seg input:checked + span { background:#5b7cfa; color:#fff; }
    .cn-seg span { display:inline-block; padding:8px 14px; margin:-8px -14px; }
    #cnCanvas { max-width:100%; border-radius:12px; box-shadow:0 6px 24px rgba(20,30,80,.15); display:block; }
    .cn-status { font-size:.9rem; padding:8px 12px; border-radius:8px; margin:8px 0; display:none; }
    .cn-status.show { display:block; }
    .cn-status.err { background:#fdecec; color:#c0392b; }
    .cn-status.ok { background:#eafaf0; color:#1e824c; }
    .cn-status.busy { background:#eef2ff; color:#3a5bd0; }
    .cn-btn-row { display:flex; gap:10px; flex-wrap:wrap; margin-top:6px; }
    details.cn-settings { margin-bottom:16px; border:1px solid #e2e6f0; border-radius:10px; padding:6px 12px; background:#fbfcff; }
    details.cn-settings summary { cursor:pointer; font-weight:600; font-size:.9rem; color:#5a6280; }
    .btn-ghost { background:#fff; border:1px solid #d5d9e6; border-radius:10px; padding:12px 18px; font:inherit; cursor:pointer; }
    .btn-ghost:hover { background:#f4f6fb; }
    @media (prefers-color-scheme: dark) {
      textarea.cn-ta, input.cn-in { background:#1c2130; color:#e8ebf5; border-color:#333a4d; }
      .cn-drop { background:#1a1f2c; border-color:#3a4055; color:#8a90a6; }
    }
  </style>
</head>
<body>
  <nav class="back-nav"><a href="/">← 한국인계산기 전체 도구</a></nav>

  <header class="site-header">
    <h1>🌐 카드뉴스 현지화 도구</h1>
    <p class="subtitle">영어권 인스타 카드뉴스 → 한국어 카드뉴스 자동 변환</p>
  </header>

  <main class="container">

    <details class="cn-settings">
      <summary>⚙️ 백엔드 설정 (최초 1회)</summary>
      <div class="cn-field" style="margin-top:10px;">
        <label for="backendUrl">백엔드 Worker URL</label>
        <input class="cn-in" type="text" id="backendUrl" placeholder="https://cardnews-ai.<계정>.workers.dev" autocomplete="off">
        <span class="cn-hint">worker-cardnews 를 배포한 뒤 나온 주소. 브라우저에 저장됩니다.</span>
      </div>
    </details>

    <!-- 1. 입력 -->
    <section class="card">
      <h2 style="margin-top:0;">① 입력</h2>

      <div class="cn-field">
        <label>카드뉴스 이미지 (영문)</label>
        <div class="cn-drop" id="cardDrop">이미지를 끌어다 놓거나 클릭해서 선택 · 붙여넣기(Ctrl+V)도 가능</div>
        <input type="file" id="cardFile" accept="image/*" hidden>
        <img class="cn-thumb" id="cardThumb" alt="" hidden>
      </div>

      <div class="cn-field">
        <label for="captionInput">게시물 캡션 (영문)</label>
        <textarea class="cn-ta" id="captionInput" placeholder="원문 캡션을 붙여넣으세요"></textarea>
      </div>

      <div class="cn-field">
        <label>원본 이미지 (텍스트 없는 원본 사진)</label>
        <div class="cn-tabs">
          <button type="button" class="cn-tab on" data-omode="url">URL 입력</button>
          <button type="button" class="cn-tab" data-omode="file">파일 업로드</button>
        </div>
        <div id="origUrlBox">
          <input class="cn-in" type="text" id="origUrl" placeholder="https://... 역방향 이미지 검색으로 찾은 원본 이미지 주소">
          <span class="cn-hint">외부 이미지는 백엔드 프록시를 통해 불러옵니다(캔버스 저장 오류 방지).</span>
        </div>
        <div id="origFileBox" hidden>
          <div class="cn-drop" id="origDrop">원본 이미지를 끌어다 놓거나 클릭해서 선택</div>
          <input type="file" id="origFile" accept="image/*" hidden>
        </div>
        <img class="cn-thumb" id="origThumb" alt="" hidden>
      </div>

      <div class="cn-status" id="analyzeStatus"></div>
      <button class="btn-primary" id="analyzeBtn" type="button">① 분석 · 번역하기</button>
    </section>

    <!-- 2. 번역 결과(편집) -->
    <section class="card" id="translateCard" hidden>
      <h2 style="margin-top:0;">② 번역 결과 확인 · 편집</h2>

      <div class="cn-field">
        <label for="headlineKo">헤드라인 (한국어) · 줄바꿈으로 두 줄 분리</label>
        <textarea class="cn-ta" id="headlineKo" style="min-height:70px;"></textarea>
        <span class="cn-hint" id="headlineEnHint"></span>
      </div>

      <div class="cn-row" style="margin-bottom:14px;">
        <div class="cn-field" style="margin-bottom:0;">
          <label>비율</label>
          <div class="cn-seg" id="ratioSeg">
            <label><input type="radio" name="ratio" value="4:5" checked><span>4:5 (세로)</span></label>
            <label><input type="radio" name="ratio" value="1:1"><span>1:1 (정사각)</span></label>
          </div>
        </div>
        <div class="cn-field" style="margin-bottom:0;">
          <label for="brandInput">브랜드 라벨</label>
          <input class="cn-in" type="text" id="brandInput" placeholder="예: MY MEDIA (비우면 생략)" style="width:200px;">
        </div>
      </div>

      <button class="btn-primary" id="renderBtn" type="button">② 이미지 생성하기</button>
    </section>

    <!-- 3. 결과 -->
    <section class="card" id="resultCard" hidden>
      <h2 style="margin-top:0;">③ 결과</h2>

      <div class="cn-field">
        <label>완성된 카드 이미지</label>
        <canvas id="cnCanvas" width="1080" height="1350"></canvas>
        <div class="cn-btn-row">
          <button class="btn-primary" id="downloadBtn" type="button">🖼️ PNG 다운로드</button>
        </div>
      </div>

      <div class="cn-field">
        <label for="captionKo">번역된 캡션 (한국어)</label>
        <textarea class="cn-ta" id="captionKo" style="min-height:140px;"></textarea>
        <div class="cn-btn-row">
          <button class="btn-ghost" id="copyCaptionBtn" type="button">📋 캡션 복사</button>
        </div>
      </div>
    </section>

  </main>

  <script src="card-news.js?v=1"></script>
</body>
</html>
