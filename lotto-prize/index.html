<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로또 당첨금 실수령액 계산기 - 세금 공제 후 실수령액</title>

  <meta property="og:title" content="로또 당첨금 실수령액 계산기">

     crossorigin="anonymous"></script>

<body>
  <nav class="back-nav"><a href="/">← calcbox.kr 전체 계산기</a></nav>

  <header class="site-header">
    <h1>🍀 로또 당첨금 실수령액 계산기</h1>
    <p class="subtitle">당첨금 세금 공제 후 실수령액을 미리 확인</p>
  </header>

  <div class="ad-container" aria-label="광고">
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-7143828779500885"
         data-ad-slot="0000000000" data-ad-format="auto" data-full-width-responsive="true"></ins>
  </div>

  <main class="container">
    <section class="card controls">
      <div class="control-row">
        <label for="amountInput">당첨금액 (원)</label>
        <input type="text" id="amountInput" placeholder="예: 2,000,000,000" inputmode="numeric" autocomplete="off">
      </div>
      <p class="error" id="errorMsg" role="alert"></p>
      <button id="calcBtn" class="btn-primary" type="button">실수령액 계산하기</button>
    </section>

    <section class="card results" id="resultsCard" hidden>
      <div class="result-hero">
        <p class="result-sub">세후 실수령액</p>
        <div class="big"><span id="netMain">0</span><small>원</small></div>
        <p class="result-sub" id="rateInfo"></p>
      </div>
      <table class="calc-table">
        <tbody>
          <tr><th>당첨금액</th><td id="rGross"></td></tr>
          <tr class="deduct"><th>제세금 합계</th><td id="rTax"></td></tr>
          <tr class="total"><th>실수령액</th><td id="rNet"></td></tr>
        </tbody>
      </table>
    </section>

    <section class="card info">
      <h2>복권 당첨금 과세 기준</h2>
      <ul>
        <li><strong>5만원 이하</strong>: 비과세 (세금 없음)</li>
        <li><strong>5만원 초과 ~ 3억원 이하</strong>: 22% (소득세 20% + 지방소득세 2%)</li>
        <li><strong>3억원 초과분</strong>: 33% (소득세 30% + 지방소득세 3%)</li>
        <li>예: 20억 당첨 시 3억까지는 22%, 나머지 17억은 33%가 적용됩니다.</li>
      </ul>
    </section>
  </main>

  <footer class="site-footer"><p>© <span id="year"></span> calcbox.kr · 로또 당첨금 실수령액 계산기</p></footer>
