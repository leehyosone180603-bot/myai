<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>전역일 계산기 - 입대일로 전역일·전역 D-day·복무 진행률 | 한국인계산기</title>
  <meta name="description" content="입대일과 군별을 선택하면 만기 전역일, 전역까지 남은 D-day, 복무 진행률을 계산해 드립니다. 육군·해군·공군·해병대·사회복무요원 복무기간을 반영합니다.">
  <meta name="keywords" content="전역일계산기, 전역일, 전역D-day, 군복무기간, 육군전역, 해군전역, 공군전역, 사회복무요원, 말년">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="전역일 계산기 - 전역일·D-day 계산">
  <meta property="og:description" content="입대일로 만기 전역일과 전역까지 남은 D-day, 복무 진행률을 계산.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://calcbox.kr/military/">
  <meta property="og:site_name" content="한국인계산기">
  <link rel="canonical" href="https://calcbox.kr/military/">

  <!-- Google AdSense 게시자 ID: ca-pub-7143828779500885 -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7143828779500885"
     crossorigin="anonymous"></script>

  <link rel="stylesheet" href="../style.css?v=4">
</head>
<body>
  <nav class="back-nav"><a href="/">← 한국인계산기 전체 계산기</a></nav>

  <header class="site-header">
    <h1>🎖️ 전역일 계산기</h1>
    <p class="subtitle">입대일로 전역일과 전역 D-day를 계산</p>
  </header>

  <div class="ad-container" aria-label="광고">
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-7143828779500885"
         data-ad-slot="0000000000" data-ad-format="auto" data-full-width-responsive="true"></ins>
  </div>

  <main class="container">
    <section class="card controls">
      <div class="control-row">
        <label for="enlistInput">입대일</label>
        <input type="date" id="enlistInput" min="2000-01-01">
      </div>

      <div class="control-row">
        <label for="branchInput">군별 (복무기간)</label>
        <select id="branchInput">
          <option value="18">육군 / 해병대 (18개월)</option>
          <option value="20">해군 (20개월)</option>
          <option value="21">공군 (21개월)</option>
          <option value="21">사회복무요원 (21개월)</option>
        </select>
      </div>

      <p class="error" id="errorMsg" role="alert"></p>
      <button id="calcBtn" class="btn-primary" type="button">전역일 계산하기</button>
    </section>

    <section class="card results" id="resultsCard" hidden>
      <div class="result-hero">
        <p class="result-sub">전역까지</p>
        <div class="big"><span id="ddayMain">D-0</span></div>
        <p class="result-sub" id="dischargeInfo"></p>
      </div>
      <table class="calc-table">
        <tbody>
          <tr><th>입대일</th><td id="rEnlist"></td></tr>
          <tr><th>만기 전역일</th><td id="rDischarge"></td></tr>
          <tr><th>총 복무일수</th><td id="rTotalDays"></td></tr>
          <tr><th>복무한 일수</th><td id="rServed"></td></tr>
          <tr><th>남은 일수</th><td id="rRemain"></td></tr>
          <tr class="total"><th>복무 진행률</th><td id="rProgress"></td></tr>
        </tbody>
      </table>
    </section>

    <section class="card info">
      <h2>이용 안내</h2>
      <ul>
        <li>만기 전역일은 <strong>입대일로부터 복무개월이 되는 날의 전날</strong>로 계산합니다.</li>
        <li>현역 복무기간(2026년 기준): 육군·해병대 18개월, 해군 20개월, 공군 21개월, 사회복무요원 21개월.</li>
        <li>조기 전역, 분할 복무, 제도 변경 등에 따라 실제 전역일과 다를 수 있습니다.</li>
      </ul>
    </section>
  </main>

  <footer class="site-footer"><p>© <span id="year"></span> 한국인계산기 · 전역일 계산기</p></footer>
  <script src="military.js?v=1"></script>
</body>
</html>
