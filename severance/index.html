<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>퇴직금 계산기 - 평균임금 기준 예상 퇴직금 계산 | 한국인계산기</title>
  <meta name="description" content="입사일·퇴사일과 최근 3개월 임금을 입력하면 평균임금 기준 예상 퇴직금을 계산해 드립니다. 연간 상여금·연차수당도 반영하여 1일 평균임금과 퇴직금을 보여줍니다.">
  <meta name="keywords" content="퇴직금계산기, 퇴직금, 평균임금, 예상퇴직금, 재직일수, 퇴직금계산, 상여금">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="퇴직금 계산기 - 예상 퇴직금 계산">
  <meta property="og:description" content="입사일·퇴사일·평균임금으로 예상 퇴직금을 계산.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://calcbox.kr/severance/">
  <meta property="og:site_name" content="한국인계산기">

  <!-- Google AdSense 게시자 ID: ca-pub-7143828779500885 -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7143828779500885"
     crossorigin="anonymous"></script>

  <link rel="stylesheet" href="../style.css?v=4">
</head>
<body>
  <nav class="back-nav"><a href="/">← 한국인계산기 전체 계산기</a></nav>

  <header class="site-header">
    <h1>💼 퇴직금 계산기</h1>
    <p class="subtitle">평균임금 기준 예상 퇴직금을 계산</p>
  </header>

  <div class="ad-container" aria-label="광고">
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-7143828779500885"
         data-ad-slot="0000000000" data-ad-format="auto" data-full-width-responsive="true"></ins>
  </div>

  <main class="container">
    <section class="card controls">
      <div class="control-row">
        <label for="joinInput">입사일</label>
        <input type="date" id="joinInput">
      </div>
      <div class="control-row">
        <label for="leaveInput">퇴사일</label>
        <input type="date" id="leaveInput">
      </div>
      <div class="control-row">
        <label for="wage3mInput">퇴직 전 3개월 임금 총액 (원)</label>
        <input type="text" id="wage3mInput" placeholder="예: 9,000,000" inputmode="numeric" autocomplete="off">
      </div>
      <div class="control-row">
        <label for="bonusInput">연간 상여금 <small>(선택, 없으면 0)</small></label>
        <input type="text" id="bonusInput" placeholder="0" inputmode="numeric" autocomplete="off">
      </div>
      <div class="control-row">
        <label for="annualLeaveInput">연차수당 <small>(선택, 없으면 0)</small></label>
        <input type="text" id="annualLeaveInput" placeholder="0" inputmode="numeric" autocomplete="off">
      </div>

      <p class="error" id="errorMsg" role="alert"></p>
      <button id="calcBtn" class="btn-primary" type="button">퇴직금 계산하기</button>
    </section>

    <section class="card results" id="resultsCard" hidden>
      <div class="result-hero">
        <p class="result-sub">예상 퇴직금</p>
        <div class="big"><span id="payMain">0</span><small>원</small></div>
      </div>
      <table class="calc-table">
        <tbody>
          <tr><th>재직일수</th><td id="rDays"></td></tr>
          <tr><th>1일 평균임금</th><td id="rAvg"></td></tr>
          <tr class="total"><th>예상 퇴직금</th><td id="rPay"></td></tr>
        </tbody>
      </table>
    </section>

    <section class="card info">
      <h2>이용 안내</h2>
      <ul>
        <li><strong>퇴직금 = 1일 평균임금 × 30 × (재직일수 ÷ 365)</strong></li>
        <li>1일 평균임금 = (퇴직 전 3개월 임금 + 연간 상여금×3/12 + 연차수당×3/12) ÷ 3개월 총일수</li>
        <li>계속근로기간이 <strong>1년 미만</strong>이면 법정 퇴직금이 발생하지 않습니다.</li>
        <li>실제 금액은 회사 규정·통상임금 산정에 따라 달라질 수 있는 <strong>참고용 추정치</strong>입니다.</li>
      </ul>
    </section>
  </main>

  <footer class="site-footer"><p>© <span id="year"></span> 한국인계산기 · 퇴직금 계산기</p></footer>

</body>
</html>
