<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>부가세 계산기 - 부가가치세 10% 공급가액·합계금액 계산</title>
  <meta name="description" content="금액을 입력하면 부가가치세(10%)를 자동 계산해 드립니다. 공급가액 기준·합계금액(부가세 포함) 기준 모두 지원하여 공급가액, 부가세, 합계를 한 번에 확인하세요.">
  <meta name="keywords" content="부가세계산기, 부가가치세, VAT, 공급가액, 합계금액, 세금계산서, 부가세10%">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="부가세 계산기 - 부가가치세 10% 계산">
  <meta property="og:description" content="공급가액·합계금액 기준으로 부가가치세 10%를 자동 계산.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://calcbox.kr/vat/">
  <meta property="og:site_name" content="calcbox.kr">
  <link rel="canonical" href="https://calcbox.kr/vat/">

  <!-- Google AdSense 게시자 ID: ca-pub-7143828779500885 -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7143828779500885"
     crossorigin="anonymous"></script>

  <link rel="stylesheet" href="../style.css?v=4">
</head>
<body>
  <nav class="back-nav"><a href="/">← calcbox.kr 전체 계산기</a></nav>

  <header class="site-header">
    <h1>🧾 부가세 계산기</h1>
    <p class="subtitle">부가가치세 10%를 빠르게 계산</p>
  </header>

  <div class="ad-container" aria-label="광고">
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-7143828779500885"
         data-ad-slot="0000000000" data-ad-format="auto" data-full-width-responsive="true"></ins>
  </div>

  <main class="container">
    <section class="card controls">
      <div class="control-row">
        <label>계산 기준</label>
        <div class="segment">
          <label><input type="radio" name="mode" value="supply" checked><span>공급가액 기준</span></label>
          <label><input type="radio" name="mode" value="total"><span>합계금액 기준</span></label>
        </div>
      </div>

      <div class="control-row">
        <label for="amountInput">금액 (원)</label>
        <input type="text" id="amountInput" placeholder="예: 1,000,000" inputmode="numeric" autocomplete="off">
      </div>

      <p class="error" id="errorMsg" role="alert"></p>
      <button id="calcBtn" class="btn-primary" type="button">부가세 계산하기</button>
    </section>

    <section class="card results" id="resultsCard" hidden>
      <table class="calc-table">
        <tbody>
          <tr><th>공급가액</th><td id="rSupply"></td></tr>
          <tr><th>부가세 (10%)</th><td id="rVat"></td></tr>
          <tr class="total"><th>합계금액</th><td id="rTotal"></td></tr>
        </tbody>
      </table>
    </section>

    <section class="card info">
      <h2>이용 안내</h2>
      <ul>
        <li><strong>공급가액 기준</strong>: 입력 금액에 10%를 더해 부가세와 합계를 계산합니다. (부가세 = 공급가액 × 10%)</li>
        <li><strong>합계금액 기준</strong>: 부가세가 포함된 금액에서 공급가액과 부가세를 분리합니다. (공급가액 = 합계 ÷ 1.1)</li>
        <li>일반과세자의 부가가치세율은 10%입니다.</li>
      </ul>
    </section>
  </main>

  <footer class="site-footer"><p>© <span id="year"></span> calcbox.kr · 부가세 계산기</p></footer>
  <script src="vat.js?v=1"></script>
</body>
</html>
