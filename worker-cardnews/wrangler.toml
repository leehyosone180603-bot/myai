name = "cardnews-ai"
main = "src/index.js"
compatibility_date = "2024-11-01"

# 공개 변수 (민감정보 아님)
[vars]
# Claude 모델 (비전 지원). 필요 시 claude-opus-4-8 등으로 교체 가능.
MODEL = "claude-sonnet-5"
# CORS 허용 오리진. 배포 사이트로 좁히려면 예: "https://calcbox.kr"
# 로컬 테스트 편의를 위해 기본은 "*"
ALLOWED_ORIGIN = "*"

# 시크릿은 커밋하지 말고 CLI로 등록:
#   npx wrangler secret put ANTHROPIC_API_KEY
#
# 배포:
#   cd worker-cardnews && npm i -g wrangler && wrangler deploy
# 배포 후 나오는 URL(예: https://cardnews-ai.<계정>.workers.dev)을
# card-news 페이지의 "백엔드 URL"에 넣으세요.
